workflows:
  unsigned-ios-ipa:
    name: Build unsigned iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Show tool versions
        script: |
          flutter --version
          xcodebuild -version
          pod --version
      - name: Install dependencies
        script: flutter pub get
      - name: Analyze Dart
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Build iOS app without code signing
        script: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        script: |
          mkdir -p build/ios/unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/unsigned/Payload/Runner.app
          cd build/ios/unsigned
          zip -qry HapticBeat-unsigned.ipa Payload
          ls -lh HapticBeat-unsigned.ipa
    artifacts:
      - build/ios/unsigned/HapticBeat-unsigned.ipa
