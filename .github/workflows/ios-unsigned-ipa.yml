name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build iOS app without code signing
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/unsigned/Payload/Runner.app
          cd build/ios/unsigned
          zip -qry HapticBeat-unsigned.ipa Payload
          ls -lh HapticBeat-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: HapticBeat-unsigned-ipa
          path: build/ios/unsigned/HapticBeat-unsigned.ipa
          if-no-files-found: error
          retention-days: 7
