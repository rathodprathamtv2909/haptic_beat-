name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build iOS app without code signing
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee ios-build.log

      - name: Annotate iOS build log on failure
        if: failure()
        run: |
          echo "### iOS build log tail" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -n 140 ios-build.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 80 ios-build.log | while IFS= read -r line; do
            safe_line="${line//'%'/'%25'}"
            safe_line="${safe_line//$'\r'/'%0D'}"
            safe_line="${safe_line//$'\n'/'%0A'}"
            echo "::error file=ios/Runner/AppDelegate.swift,line=1::$safe_line"
          done

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/unsigned/Payload/Runner.app
          cd build/ios/unsigned
          zip -qry HapticBeat-unsigned.ipa Payload
          ls -lh HapticBeat-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: HapticBeat-unsigned-ipa
          path: build/ios/unsigned/HapticBeat-unsigned.ipa
          if-no-files-found: error
          retention-days: 7
